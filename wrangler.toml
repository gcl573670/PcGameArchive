name = "pcgamearchive-worker"
main = "functions/[[catchall]].js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespace for caching
# Create this with: wrangler kv namespace create CACHE_KV
# Then paste the id below
[[kv_namespaces]]
binding = "CACHE_KV"
id = "30e6c3c9acb54e62a41f31f5d6af9fb7"

# Environment variables
[vars]
ENVIRONMENT = "production"
CACHE_TTL_JSON = "3600"
CACHE_TTL_ASSETS = "31536000"
CACHE_TTL_SITEMAP = "86400"

# Route configuration - update with your actual domain
# routes = [
#   { pattern = "pcgamearchive.com/*", zone_name = "pcgamearchive.com" }
# ]
