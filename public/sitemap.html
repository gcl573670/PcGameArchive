<!DOCTYPE html>
<html>
<head>
    <title>Sitemap - All Games & Blog Posts | PcGameArchive</title>
    <meta charset="UTF-8">
    <meta name="robots" content="index, follow">
    <style>
        body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #0a0a0a; color: #e5e5e5; }
        h1 { color: #fff; }
        h2 { color: #ccc; margin-top: 30px; }
        h3 { color: #ddd; margin-top: 20px; }
        a { color: #3b82f6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .category { margin-bottom: 30px; }
        .games { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .game, .blog-post { padding: 8px; border-radius: 8px; background: #1a1a1a; }
        .game:hover, .blog-post:hover { background: #2a2a2a; }
        .lang-selector { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .lang-btn { padding: 5px 10px; border-radius: 5px; background: #1a1a1a; cursor: pointer; }
        .lang-btn.active { background: #3b82f6; color: white; }
        .blog-section { margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 15px; }
        .blog-post { display: flex; flex-direction: column; gap: 8px; }
        .blog-post img { width: 100%; height: 120px; object-fit: cover; border-radius: 5px; }
        .blog-post h4 { margin: 0; font-size: 14px; }
        .blog-post .meta { font-size: 11px; color: #888; }
        .stats { margin-top: 30px; padding: 15px; background: #1a1a1a; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>
    <h1>Sitemap - All Free PC Games & Blog Posts</h1>
    <p id="stats">Loading...</p>
<div class="lang-selector"><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="es">ES</button><button class="lang-btn" data-lang="fr">FR</button><button class="lang-btn" data-lang="de">DE</button><button class="lang-btn" data-lang="ar">AR</button><button class="lang-btn" data-lang="bg">BG</button><button class="lang-btn" data-lang="bn">BN</button><button class="lang-btn" data-lang="cs">CS</button><button class="lang-btn" data-lang="da">DA</button><button class="lang-btn" data-lang="el">EL</button><button class="lang-btn" data-lang="fi">FI</button><button class="lang-btn" data-lang="fil">FIL</button><button class="lang-btn" data-lang="he">HE</button><button class="lang-btn" data-lang="hi">HI</button><button class="lang-btn" data-lang="hr">HR</button><button class="lang-btn" data-lang="hu">HU</button><button class="lang-btn" data-lang="id">ID</button><button class="lang-btn" data-lang="it">IT</button><button class="lang-btn" data-lang="ja">JA</button><button class="lang-btn" data-lang="ko">KO</button><button class="lang-btn" data-lang="ms">MS</button><button class="lang-btn" data-lang="nl">NL</button><button class="lang-btn" data-lang="no">NO</button><button class="lang-btn" data-lang="pl">PL</button><button class="lang-btn" data-lang="pt">PT</button><button class="lang-btn" data-lang="ro">RO</button><button class="lang-btn" data-lang="ru">RU</button><button class="lang-btn" data-lang="sk">SK</button><button class="lang-btn" data-lang="sr">SR</button><button class="lang-btn" data-lang="sv">SV</button><button class="lang-btn" data-lang="th">TH</button><button class="lang-btn" data-lang="tr">TR</button><button class="lang-btn" data-lang="uk">UK</button><button class="lang-btn" data-lang="vi">VI</button></div><div id="content"></div>
    <script>
        let currentLang = 'en';
        const categories = ['action', 'adventure', 'horror', 'indie', 'openworld', 'shooter', 'simulation', 'sports', 'strategy'];
        
        async function loadSitemap(lang) {
            const content = document.getElementById('content');
            content.innerHTML = '<p>Loading games and blog posts...</p>';
            
            // Load games
            let allPosts = [];
            for (const category of categories) {
                try {
                    const response = await fetch(`/src/content/posts_json/${lang}/${category}.json`);
                    if (response.ok) {
                        const posts = await response.json();
                        allPosts.push(...posts);
                    }
                } catch(e) { console.error(e); }
            }
            
            // Load blog posts
            let blogPosts = [];
            try {
                const blogResponse = await fetch(`/src/content/blog/${lang}/index.ts`);
                if (blogResponse.ok) {
                    const blogText = await blogResponse.text();
                    // Extract blog posts from the TypeScript file (simplified extraction)
                    const blogMatch = blogText.match(/const blogPosts: BlogPost\[\] = \[(.*?)\];/s);
                    if (blogMatch) {
                        // This is simplified - for production, better to use a proper parser
                        console.log("Blog posts found for", lang);
                    }
                }
            } catch(e) { console.log("No blog posts for", lang); }
            
            // For demo, we'll use hardcoded blog slugs that we know exist
            const blogSlugs = ['top-10-upcoming-games-2025', 'best-free-pc-games-2024', 'gaming-pc-build-guide', 'best-indie-games-2024', 'optimize-pc-for-gaming'];
            const blogTitles = {
                'top-10-upcoming-games-2025': 'Top 10 Upcoming Games You Can't Miss in 2025',
                'best-free-pc-games-2024': 'Best Free PC Games You Should Play Right Now',
                'gaming-pc-build-guide': 'Ultimate Gaming PC Build Guide 2025',
                'best-indie-games-2024': 'Hidden Gems: Best Indie Games of 2024',
                'optimize-pc-for-gaming': '10 Ways to Optimize Your PC for Gaming'
            };
            
            // Group games by category
            const postsByCategory = {};
            categories.forEach(cat => postsByCategory[cat] = []);
            allPosts.forEach(post => {
                if (postsByCategory[post.frontmatter.category]) {
                    postsByCategory[post.frontmatter.category].push(post);
                }
            });
            
            let html = `
                <div class="stats">
                    <strong>Total Games:</strong> ${allPosts.length} | 
                    <strong>Total Blog Posts:</strong> ${blogSlugs.length}
                </div>
            `;
            
            // Blog Section
            html += `<div class="blog-section">
                <h2>📝 Blog Posts (${blogSlugs.length} articles)</h2>
                <div class="blog-grid">`;
            
            for (const slug of blogSlugs) {
                html += `
                    <div class="blog-post">
                        <a href="/${lang}/blog/${slug}">
                            <h4>${blogTitles[slug] || slug}</h4>
                            <div class="meta">Read article →</div>
                        </a>
                    </div>
                `;
            }
            
            html += `</div></div>`;
            
            // Games Section
            html += `<h2>🎮 Games by Category</h2>`;
            
            for (const category of categories) {
                const posts = postsByCategory[category];
                if (posts.length === 0) continue;
                
                html += `<div class="category">
                    <h3>${category.toUpperCase()} (${posts.length} games)</h3>
                    <div class="games">`;
                
                posts.forEach(post => {
                    html += `<div class="game">
                        <a href="/${lang}/game/${post.slug}">${post.frontmatter.title}</a>
                    </div>`;
                });
                
                html += `</div></div>`;
            }
            
            document.getElementById('stats').innerHTML = `Total: ${allPosts.length} games | ${blogSlugs.length} blog posts available for download.`;
            content.innerHTML = html;
        }
        
        // Language selector
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLang = btn.dataset.lang;
                loadSitemap(currentLang);
            });
        });
        
        // Load default language
        loadSitemap('en');
    </script>
</body>
</html>
